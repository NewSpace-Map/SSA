    body, html {

      top: 200px;
      left: 20px;
      background: white;

      font-size: 18px;
      border-bottom: 1px solid #eee;
      padding-bottom: 5px;
    }

    }
    .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 5px 0;
      user-select: none;
    }
    .filter-arrow {
      transition: transform 0.3s ease;
      font-size: 16px;
    }
    .filter-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .filter-content.open {
      max-height: 300px;
      margin-top: 8px;
    }
    .filter-scrollable {
      max-height: 200px;
      overflow-y: auto;
      padding-right: 5px;
    }
    .filter-scrollable label {
      display: block;
      margin: 5px 0;
      font-size: 14px;
    }
    .filter-scrollable::-webkit-scrollbar {
      width: 6px;
    }
    .filter-scrollable::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 4px;
    }

    "Pure Data Players": "green",

        // Création de la carte
const map = L.map('map').setView([40, 8], 2.5);

// Icônes personnalisées (même forme, couleurs différentes)

const redIcon = new L.Icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41]
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors | CS Group'
}).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

// Affiche les marqueurs filtrés
function updateMarkers() {
  markersLayer.clearLayers();

  const selectedThemes = Array.from(document.querySelectorAll('input[name="theme"]:checked')).map(cb => cb.value);
  const selectedCountries = Array.from(document.querySelectorAll('input[name="country"]:checked')).map(cb => cb.value);

  companies.forEach(company => {
    const matchesTheme = selectedThemes.length === 0 || selectedThemes.some(theme => (company.theme || []).includes(theme));
    const matchesCountry = selectedCountries.length === 0 || selectedCountries.includes(company.country);

    if (company.lat && company.lon && matchesTheme && matchesCountry) {
      let icon = redIcon; // Icône par défaut est rouge

      if (company.theme && themeColors[company.theme]) {
        let iconColor = themeColors[company.theme];
        icon = new L.Icon({
            iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${iconColor}.png`,
            shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
      }

L.marker([company.lat, company.lon], { icon })
  .addTo(markersLayer)
 .bindPopup(`
  <div style="display: flex; align-items: flex-start;">
    ${company.logo ? `
      <div style="margin-right:10px;text-align:center;">
        <img src="${company.logo}" alt="${company.name}" style="width:100px;height:100px;object-fit:contain;"><br>
        <small>${company.founded || "N/A"}</small>
      </div>
    ` : ''}
    <div>
      <strong>${company.name}</strong> <strong>${company.localisation}</strong><br>
      <em>${company.city}, ${company.country}</em><br>
      ${company.employees ? `<small>👥 ${company.employees} employees</small><br>` : ''}
      <small>${company.activity || ""}</small><br>
      ${company.web ? `<a href="${company.web}" target="_blank">Site web</a> | ` : ''}
      ${company.linkedin ? `<a href="${company.linkedin}" target="_blank">LinkedIn</a>` : ''}
    </div>
  </div>
`);
    }
  });
}
// Génère les cases à cocher dynamiquement
function createCheckboxes(containerId, items) {
  const container = document.getElementById(containerId);
  items.forEach(item => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" value="${item}" checked> ${item}`;
    container.appendChild(label);
  });
}

// Init thèmes et pays
createCheckboxes('theme-checkboxes', themes);
const countries = [...new Set(companies.map(c => c.country))].sort();
createCheckboxes('country-checkboxes', countries);

// Récupère les valeurs cochées
function getSelectedValues(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} input:checked`)).map(input => input.value);
}

// Met à jour les marqueurs au changement
document.getElementById('filter-box').addEventListener('change', () => {
  const selectedThemes = getSelectedValues('theme-checkboxes');
  const selectedCountries = getSelectedValues('country-checkboxes');
  updateMarkers(selectedThemes, selectedCountries);
});

// Déplie / replie un groupe
function toggleFilter(contentId, arrowId) {
  const content = document.getElementById(contentId);
  const arrow = document.getElementById(arrowId);

  if (content.classList.contains('open')) {
    content.classList.remove('open');
    arrow.textContent = '◀';
  } else {
    content.classList.add('open');
    arrow.textContent = '▼';
  }
}

// Affichage initial complet
updateMarkers(themes, countries);
